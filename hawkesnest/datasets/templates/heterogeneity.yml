# Heterogeneity pillar — baseline template (H0: homogeneous background).
#
# Override `backgrounds[0]` to sweep heterogeneity levels:
#
#   H0 — constant background (baseline; all models should fit well)
#        backgrounds: [{type: constant, rate: 2.4}]
#
#   H1 — stationary 3-component GMM hotspots
#        backgrounds: [{type: function, name: cluster_mix,
#                       centers: [[0.2,0.2],[0.5,0.8],[0.8,0.3]],
#                       sigma: 0.12, base: 0.5}]
#
#   H2 — single traveling Gaussian hotspot
#        backgrounds: [{type: function, name: moving_gauss,
#                       start: [0.1, 0.1], v: [0.012, 0.008],
#                       sigma: 0.12, base: 0.5}]
#
#   H3 — Gabor traveling-wave spatial pattern
#        backgrounds: [{type: function, name: gabor_travel,
#                       a0: 0.5, amp: 2.0, fx: 3.0, fy: 3.0, ft: 0.08,
#                       sigma: 0.3, start: [0.5, 0.5]}]
#
# Kernel and adjacency are fixed across all levels (separable baseline).
domain: {type: rectangle, x_min: 0, x_max: 1, y_min: 0, y_max: 1}
lambda_max: 100
backgrounds:
  - {type: constant, rate: 2.4}
kernels:
  - type: separable
    temporal_decay: 0.3
    spatial_sigma: 0.08
adjacency:
  - [33.16]
