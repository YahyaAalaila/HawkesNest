# Topology pillar — baseline template (T0: full rectangle domain).
#
# Override `domain` to sweep topology levels:
#
#   T0 — full unit square (baseline)
#        domain: {type: rectangle, x_min: 0, x_max: 1, y_min: 0, y_max: 1}
#
#   T1 — horizontal exclusion strip (one barrier)
#        domain:
#          type: barrier
#          x_min: 0
#          x_max: 1
#          y_min: 0
#          y_max: 1
#          barriers: [[0.0, 1.0, 0.45, 0.55]]
#
#   T2 — L-shape: two barriers creating a corner exclusion
#        domain:
#          type: barrier
#          x_min: 0
#          x_max: 1
#          y_min: 0
#          y_max: 1
#          barriers: [[0.5, 1.0, 0.5, 1.0], [0.0, 1.0, 0.45, 0.55]]
#
# Background and kernel are fixed across all levels.
domain: {type: rectangle, x_min: 0, x_max: 1, y_min: 0, y_max: 1}
lambda_max: 100
backgrounds:
  - {type: constant, rate: 2.4}
kernels:
  - type: separable
    temporal_decay: 0.3
    spatial_sigma: 0.08
adjacency:
  - [33.16]
